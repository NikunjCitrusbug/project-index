name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Validate tag matches package version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          tag = os.environ["RELEASE_TAG"].strip()

          with open("pyproject.toml", "r", encoding="utf-8") as f:
              pyproject = f.read()
          m = re.search(r'^\s*version\s*=\s*"([^"]+)"\s*$', pyproject, re.MULTILINE)
          if not m:
            print("Could not find [project].version in pyproject.toml")
            sys.exit(1)
          version = m.group(1)
          expected_tag = f"v{version}"

          print(f"Tag: {tag}")
          print(f"pyproject version: {version}")
          if tag != expected_tag:
            print(f"Tag/version mismatch. Expected {expected_tag}, got {tag}")
            sys.exit(1)
          print("Tag/version check passed.")
          PY

      - name: Build
        run: python -m build

      - name: Check artifacts
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
